<div class="weather-container">
  <h1>Weather Dashboard</h1>

  <button (click)="refresh()">Refresh</button>

  @if (loading()) {
    <p class="status">Loading...</p>
  } @else if (error()) {
    <p class="status error">{{ error() }}</p>
  } @else {
    <p class="count">Total Forecast Records: {{ forecasts().length }}</p>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Temperature (C)</th>
          <th>Temperature (F)</th>
          <th>Summary</th>
        </tr>
      </thead>
      <tbody>
        @for (f of forecasts(); track f.date) {
          <tr [class.hot]="f.tempC > 30">
            <td>{{ f.date }}</td>
            <td>{{ f.tempC }}</td>
            <td>{{ f.tempF }}</td>
            <td>{{ f.summary }}</td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
